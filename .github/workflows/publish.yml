name: Publish

on:
  push:
    branches: [master]
    # Only the PUBLISHED package's own sources gate a release. Admin/docs/
    # workflow merges (apps/admin, docs, .github, etc.) must NOT bump+republish
    # an identical library dist -- that coupled the library version to unrelated
    # changes and churned versions. A codegen worker PR writes into
    # packages/components/src/**, so a real component change still matches.
    paths:
      - "packages/components/**"

# Explicit, since GitHub's newer default token permissions are read-only --
# this workflow needs to push a version-bump commit and publish a package.
# NOTE: the version-bump step below pushes a commit directly to master. If
# master has branch protection, the github-actions bot must be allowed to
# bypass it (Settings -> Branches -> add the actor to "Allow specified actors
# to bypass required pull requests"), or this job fails at the push and no
# release is cut. This is the usual reason releases silently stop.
permissions:
  contents: write
  packages: write

# Several codegen-worker PRs can merge in quick succession. Without this, each
# push would kick off its own publish -- a burst of noisy versions and
# registry-propagation races. Only the latest push in a burst actually
# publishes. The version-bump commit carries [skip ci], so it never retriggers
# this workflow (both GitHub's native skip and the job `if:` below guard it).
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip the commit this job itself makes (the version bump) so it
    # doesn't retrigger itself.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@d-2-g-8"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run build:lib

      # Monorepo: the published package is packages/components (the root is a
      # private workspace). Bump + publish there; the version commit/tag is
      # created against the repo root git and pushed from there.
      - name: Bump patch version
        working-directory: packages/components
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch -m "chore: release %s [skip ci]"
      - name: Push version bump
        run: git push --follow-tags

      - name: Publish to GitHub Packages
        working-directory: packages/components
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Storybook is deployed separately as its own Vercel project (see
      # ai-tools-app's README, DESIGN_SYSTEM_STORYBOOK_URL) -- Vercel's own
      # GitHub integration handles that deploy on push, nothing to do here.
