name: Generate Component
run-name: "generate ${{ inputs.slug }} (job ${{ inputs.jobId }})"

# Dispatched by apps/admin (see apps/admin/lib/github.ts, dispatchGenerate)
# when a user asks the admin UI to (re)generate a component. This is the
# WORKER for the admin: the admin app itself is UI/API only (Vercel), it
# never runs a browser or the generation loop -- this workflow does.
on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Component slug to generate (e.g. button, dialog)"
        required: true
        type: string
      jobId:
        description: "Job id from the admin app's Postgres job store, used to correlate this run back to that job row"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

# Serialize runs per component slug -- two dispatches for the same
# component shouldn't race each other (git commits, PRs, etc). Runs for
# different slugs still run concurrently.
concurrency:
  group: generate-${{ inputs.slug }}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Inputs are passed via env: (not interpolated into the run: script)
      # since workflow_dispatch inputs are attacker-controllable strings --
      # interpolating them directly into a shell command would allow
      # command injection (e.g. slug = `$(rm -rf /)`).
      - name: Generate + validate
        env:
          SLUG: ${{ inputs.slug }}
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: corepack pnpm --filter @d-2-g-8/codegen codegen generate "$SLUG"

      - name: Install Chromium for Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Screenshot + update baseline
        continue-on-error: true
        env:
          SLUG: ${{ inputs.slug }}
        # webServer (in playwright.config.ts) builds + serves Storybook; a bare
        # --update-snapshots resolves to 'changed' (Playwright 1.61) -- i.e. anything
        # but 'none' -- so it writes/refreshes this component's baseline (anchored grep).
        run: |
          corepack pnpm exec playwright test -c tests/visual/playwright.config.ts --update-snapshots -g "^visual: $SLUG\$"

      - name: Visual review vs Figma
        continue-on-error: true
        env:
          SLUG: ${{ inputs.slug }}
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: corepack pnpm --filter @d-2-g-8/codegen codegen visual "$SLUG" --rendered tests/visual/__screenshots__/linux/"$SLUG".png

      - name: Read result
        id: result
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          PASSED=$(jq -r '.passed' codegen-result.json)
          ROUNDS=$(jq -r '.rounds' codegen-result.json)
          VIS_RAN=false; VIS_N=0
          if [ -f visual-result.json ]; then
            VIS_RAN=$(jq -r '.ran' visual-result.json)
            VIS_N=$(jq -r '.findings | length' visual-result.json)
          fi
          LABELS=""
          [ "$PASSED" = "true" ] || LABELS="needs-human"
          if [ "$VIS_N" -gt 0 ]; then LABELS="${LABELS:+$LABELS,}visual-review"; fi
          echo "labels=$LABELS" >> "$GITHUB_OUTPUT"
          {
            echo "body<<RESULT_EOF"
            echo "Generated \`$SLUG\` via the codegen worker (fix rounds: $ROUNDS)."
            if [ "$PASSED" != "true" ]; then
              echo ""; echo "**Unresolved after the fix loop — needs a human:**"
              # Code findings: keep the `file` prefix — for a tsc finding it holds
              # the ONLY file path (message is just "error TSxxxx: ..."), so a
              # multi-file failure would otherwise be ambiguous to triage.
              jq -r '.findings[] | "- `\(.file)` — \(.message)"' codegen-result.json
            fi
            if [ "$VIS_N" -gt 0 ]; then
              echo ""; echo "**Visual review vs Figma (advisory):**"
              jq -r '.findings[] | "- \(.message)"' visual-result.json
            elif [ "$VIS_RAN" != "true" ]; then
              echo ""; echo "_Visual review skipped (no Figma node id or render unavailable)._"
            fi
            echo "RESULT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open/update PR
        # Third-party action pinned to a full commit SHA (supply-chain: a tag is
        # movable, a SHA is immutable). Runs with contents/pull-requests write.
        # Bump deliberately (verify the SHA against the upstream release).
        uses: peter-evans/create-pull-request@6d6857d36972b65feb161a90e484f2984215f83e # v6.0.5
        with:
          # A PAT, NOT the default GITHUB_TOKEN: the automatic token is blocked
          # from opening PRs ("GitHub Actions is not permitted to create or
          # approve pull requests") AND PRs it opens do not trigger ci.yml's
          # `on: pull_request` run -- which the admin's merge gate depends on.
          # The PAT needs Contents: write + Pull requests: write on this repo.
          token: ${{ secrets.CREATE_PR_TOKEN }}
          branch: codegen/${{ inputs.slug }}
          base: master
          title: "codegen: ${{ inputs.slug }}"
          body: ${{ steps.result.outputs.body }}
          labels: ${{ steps.result.outputs.labels }}
          add-paths: |
            packages/components
            tests/visual/__screenshots__
          commit-message: "codegen: generate ${{ inputs.slug }}"
